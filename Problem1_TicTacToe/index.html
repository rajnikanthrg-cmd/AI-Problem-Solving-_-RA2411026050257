<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080810;
            --panel-bg: #0f0f1c;
            --border-color: #2d2d4e;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent-indigo: #3730a3;
            --x-color: #60a5fa;
            --o-color: #34d399;
            --win-color: #ca8a04;
            --win-bg: #1a1500;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-weight: 700;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 300px minmax(350px, 1fr) 400px;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel h2 {
            font-size: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Forms and Buttons */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        select, button {
            font-family: 'Space Grotesk', sans-serif;
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--accent-indigo);
            box-shadow: 0 0 0 2px rgba(55, 48, 163, 0.2);
        }

        select option {
            background-color: var(--panel-bg);
            color: var(--text-main);
        }
        
        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button {
            background-color: var(--accent-indigo);
            color: white;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
        }

        button:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #btn-restart {
            background-color: #1d4ed8;
        }
        #btn-restart:hover {
            background-color: #2563eb;
        }

        /* Score Tracker */
        .score-tracker {
            display: flex;
            justify-content: space-between;
            background-color: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .score-item {
            text-align: center;
        }

        .score-item span {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .score-item .label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Board */
        .board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
            min-width: 300px;
            min-height: 300px;
            aspect-ratio: 1;
            background-color: var(--border-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .cell {
            background-color: var(--panel-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .cell:hover:not(.occupied) {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .cell.x {
            color: var(--x-color);
        }

        .cell.o {
            color: var(--o-color);
        }

        .cell.occupied {
            cursor: default;
        }

        @keyframes winPulse {
            0% { background-color: var(--panel-bg); }
            50% { background-color: var(--win-bg); }
            100% { background-color: var(--panel-bg); }
        }

        .cell.win {
            animation: winPulse 2s infinite;
            color: var(--win-color);
            border-color: var(--win-color);
            background-color: var(--win-bg);
            z-index: 1;
        }

        .game-status {
            margin-top: 1.5rem;
            font-size: 1.25rem;
            height: 2rem;
            text-align: center;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Right Panel */
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .stats-table th, .stats-table td {
            padding: 0.75rem 0.5rem;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .stats-table th {
            text-align: right;
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .stats-table th:first-child, .stats-table td:first-child {
            text-align: left;
        }

        .stats-table tr:last-child td {
            border-bottom: none;
        }

        .chart-container {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .bar-label {
            width: 80px;
            color: var(--text-muted);
        }

        .bar-wrapper {
            flex-grow: 1;
            height: 12px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 6px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s ease-out;
            width: 0%;
        }

        .bar-mm { background-color: var(--accent-indigo); }
        .bar-ab { background-color: #0e7490; }

        .reduction-text {
            font-size: 0.85rem;
            color: var(--text-main);
            text-align: center;
            margin-top: 0.5rem;
            font-weight: 600;
            min-height: 1.2rem;
        }

        .log-container {
            flex-grow: 1;
            background-color: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 1rem;
            overflow-y: auto;
            max-height: 250px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .log-entry {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.5rem;
        }
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-entry.human { color: #94a3b8; }
        .log-entry.ai { color: #60a5fa; }
        .log-entry.system { color: #fbbf24; }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                max-width: 500px;
            }
            .center-panel {
                order: -1;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Tic-Tac-Toe AI</h1>
        <p style="color: var(--text-muted);">Minimax vs Alpha-Beta Pruning</p>
    </div>

    <div class="main-container">
        <!-- Left Panel: Settings -->
        <div class="left-panel panel">
            <h2>Settings</h2>
            
            <div class="score-tracker">
                <div class="score-item">
                    <span id="score-wins">0</span>
                    <div class="label" id="label-x">Human (X)</div>
                </div>
                <div class="score-item">
                    <span id="score-draws">0</span>
                    <div class="label">Draws</div>
                </div>
                <div class="score-item">
                    <span id="score-losses">0</span>
                    <div class="label" id="label-o">AI (O)</div>
                </div>
            </div>

            <div class="form-group">
                <label for="game-mode">Game Mode</label>
                <select id="game-mode">
                    <option value="pve">Human vs AI</option>
                    <option value="pvp">Human vs Human</option>
                </select>
            </div>

            <div class="form-group">
                <label for="difficulty">Difficulty</label>
                <select id="difficulty">
                    <option value="hard">Hard (Optimal AI)</option>
                    <option value="easy">Easy (Random AI)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="algorithm">AI Algorithm</label>
                <select id="algorithm">
                    <option value="both">Both (Compare)</option>
                    <option value="alphabeta">Alpha-Beta Pruning</option>
                    <option value="minimax">Minimax</option>
                </select>
            </div>

            <button id="btn-restart">New Game</button>
        </div>

        <!-- Center Panel: Board -->
        <div class="center-panel board-container">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <div class="game-status" id="game-status">Your turn! (X)</div>
        </div>

        <!-- Right Panel: Stats -->
        <div class="right-panel panel">
            <div id="ai-panel-content">
                <h2>Algorithm Comparison</h2>
                
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>Algorithm</th>
                            <th>Nodes Explored</th>
                            <th>Time (ms)</th>
                            <th>Nodes Pruned</th>
                        </tr>
                    </thead>
                    <tbody id="stats-body">
                        <tr>
                            <td>Minimax</td>
                            <td id="stat-mm-nodes">-</td>
                            <td id="stat-mm-time">-</td>
                            <td>0</td>
                        </tr>
                        <tr>
                            <td>Alpha-Beta</td>
                            <td id="stat-ab-nodes">-</td>
                            <td id="stat-ab-time">-</td>
                            <td id="stat-ab-pruned">-</td>
                        </tr>
                    </tbody>
                </table>

                <div class="chart-container">
                    <div class="bar-row">
                        <div class="bar-label">Minimax</div>
                        <div class="bar-wrapper">
                            <div class="bar bar-mm" id="bar-mm"></div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <div class="bar-label">Alpha-Beta</div>
                        <div class="bar-wrapper">
                            <div class="bar bar-ab" id="bar-ab"></div>
                        </div>
                    </div>
                    <div class="reduction-text" id="reduction-text"></div>
                </div>
            </div>

            <div id="pvp-panel-message" style="display: none; text-align: center; padding: 2rem 0; margin-bottom: 1rem;">
                <h2 style="border: none; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: none; font-size: 1.5rem;">2 Player Mode</h2>
                <p style="color: var(--text-muted); font-size: 0.95rem;">AI algorithms disabled</p>
            </div>

            <h2>Step Log</h2>
            <div class="log-container" id="step-log">
                <!-- Log entries added dynamically -->
            </div>
        </div>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('game-status');
        const restartBtn = document.getElementById('btn-restart');
        const difficultySelect = document.getElementById('difficulty');
        const algorithmSelect = document.getElementById('algorithm');
        const gameModeSelect = document.getElementById('game-mode');
        const stepLog = document.getElementById('step-log');

        let board = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let currentPlayer = 'X'; 
        let moveCount = 0;

        let scores = { wins: 0, losses: 0, draws: 0 };

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        restartBtn.addEventListener('click', resetGame);
        
        gameModeSelect.addEventListener('change', () => {
            scores = { wins: 0, losses: 0, draws: 0 };
            document.getElementById('score-wins').textContent = 0;
            document.getElementById('score-losses').textContent = 0;
            document.getElementById('score-draws').textContent = 0;
            stepLog.innerHTML = ''; 
            resetGame();
        });

        function handleCellClick(e) {
            const clickedCell = e.target;
            const cellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (board[cellIndex] !== '' || !gameActive) {
                return;
            }

            const mode = gameModeSelect.value;
            
            if (mode === 'pve') {
                if (currentPlayer !== 'X') return;
                
                let nextMoveNum = moveCount + 1;
                logStep(`Move ${nextMoveNum}: Human played position ${cellIndex} (X)`, 'human');
                makeMove(cellIndex, 'X');
                
                if (gameActive) {
                    currentPlayer = 'O';
                    statusDisplay.textContent = 'AI is thinking...';
                    setTimeout(aiTurn, 50);
                }
            } else {
                let current = currentPlayer;
                let next = current === 'X' ? 'O' : 'X';
                let playerNum = current === 'X' ? 1 : 2;
                let nextPlayerNum = next === 'X' ? 1 : 2;
                
                let nextMoveNum = moveCount + 1;
                logStep(`Move ${nextMoveNum}: Player ${playerNum} played position ${cellIndex} (${current})`, 'human');
                makeMove(cellIndex, current);
                
                if (gameActive) {
                    currentPlayer = next;
                    statusDisplay.textContent = `Player ${nextPlayerNum}'s Turn (${next})`;
                }
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            cells[index].textContent = player;
            cells[index].classList.add(player.toLowerCase());
            cells[index].classList.add('occupied');
            moveCount++;
            
            checkWinCondition();
        }

        function checkWinCondition() {
            let roundWon = false;
            let winningLine = [];
            
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    winningLine = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                gameActive = false;
                winningLine.forEach(index => cells[index].classList.add('win'));
                
                const mode = gameModeSelect.value;
                if (mode === 'pvp') {
                    if (currentPlayer === 'X') {
                        statusDisplay.textContent = 'Player 1 (X) Wins!';
                        scores.wins++;
                        document.getElementById('score-wins').textContent = scores.wins;
                        logStep(`Game Over - Player 1 (X) Wins!`, 'system');
                    } else {
                        statusDisplay.textContent = 'Player 2 (O) Wins!';
                        scores.losses++;
                        document.getElementById('score-losses').textContent = scores.losses;
                        logStep(`Game Over - Player 2 (O) Wins!`, 'system');
                    }
                } else {
                    if (currentPlayer === 'X') {
                        statusDisplay.textContent = 'You Win!';
                        scores.wins++;
                        document.getElementById('score-wins').textContent = scores.wins;
                        logStep(`Game Over - Human Wins!`, 'system');
                    } else {
                        statusDisplay.textContent = 'AI Wins!';
                        scores.losses++;
                        document.getElementById('score-losses').textContent = scores.losses;
                        logStep(`Game Over - AI Wins!`, 'system');
                    }
                }
                return;
            }

            let roundDraw = !board.includes('');
            if (roundDraw) {
                statusDisplay.textContent = 'Draw!';
                gameActive = false;
                scores.draws++;
                document.getElementById('score-draws').textContent = scores.draws;
                logStep(`Game Over - Draw!`, 'system');
                return;
            }
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';
            moveCount = 0;
            
            const mode = gameModeSelect.value;
            if (mode === 'pvp') {
                statusDisplay.textContent = 'Player 1\'s Turn (X)';
                document.getElementById('label-x').textContent = 'Player 1 (X)';
                document.getElementById('label-o').textContent = 'Player 2 (O)';
                document.getElementById('ai-panel-content').style.display = 'none';
                document.getElementById('pvp-panel-message').style.display = 'block';
                difficultySelect.disabled = true;
                algorithmSelect.disabled = true;
                logStep(`--- New Game: Human vs Human ---`, 'system');
            } else {
                statusDisplay.textContent = 'Your turn! (X)';
                document.getElementById('label-x').textContent = 'Human (X)';
                document.getElementById('label-o').textContent = 'AI (O)';
                document.getElementById('ai-panel-content').style.display = 'block';
                document.getElementById('pvp-panel-message').style.display = 'none';
                difficultySelect.disabled = false;
                algorithmSelect.disabled = false;
                logStep(`--- New Game: Human vs AI ---`, 'system');
            }
            
            cells.forEach(cell => {
                cell.textContent = '';
                cell.className = 'cell';
            });
            
            document.getElementById('stat-mm-nodes').textContent = '-';
            document.getElementById('stat-mm-time').textContent = '-';
            document.getElementById('stat-ab-nodes').textContent = '-';
            document.getElementById('stat-ab-time').textContent = '-';
            document.getElementById('stat-ab-pruned').textContent = '-';
            document.getElementById('bar-mm').style.width = '0%';
            document.getElementById('bar-ab').style.width = '0%';
            document.getElementById('reduction-text').textContent = '';
        }

        function logStep(message, type) {
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.textContent = message;
            stepLog.appendChild(div);
            stepLog.scrollTop = stepLog.scrollHeight;
        }

        // --- AI Algorithms ---

        function checkWinnerState(b) {
            for (let i = 0; i < winningConditions.length; i++) {
                const [x, y, z] = winningConditions[i];
                if (b[x] && b[x] === b[y] && b[x] === b[z]) {
                    return b[x];
                }
            }
            if (!b.includes('')) return 'tie';
            return null;
        }

        let nodesMM = 0;
        let nodesAB = 0;
        let prunedAB = 0; 

        function minimax(b, depth, isMaximizing) {
            nodesMM++;
            let result = checkWinnerState(b);
            if (result === 'O') return 10 - depth;
            if (result === 'X') return depth - 10;
            if (result === 'tie') return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (b[i] === '') {
                        b[i] = 'O';
                        let score = minimax(b, depth + 1, false);
                        b[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (b[i] === '') {
                        b[i] = 'X';
                        let score = minimax(b, depth + 1, true);
                        b[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function alphabeta(b, depth, alpha, beta, isMaximizing) {
            nodesAB++;
            let result = checkWinnerState(b);
            if (result === 'O') return 10 - depth;
            if (result === 'X') return depth - 10;
            if (result === 'tie') return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (b[i] === '') {
                        b[i] = 'O';
                        let score = alphabeta(b, depth + 1, alpha, beta, false);
                        b[i] = '';
                        bestScore = Math.max(score, bestScore);
                        alpha = Math.max(alpha, score);
                        if (beta <= alpha) {
                            prunedAB++; 
                            break;
                        }
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (b[i] === '') {
                        b[i] = 'X';
                        let score = alphabeta(b, depth + 1, alpha, beta, true);
                        b[i] = '';
                        bestScore = Math.min(score, bestScore);
                        beta = Math.min(beta, score);
                        if (beta <= alpha) {
                            prunedAB++; 
                            break;
                        }
                    }
                }
                return bestScore;
            }
        }

        function aiTurn() {
            const diff = difficultySelect.value;
            const algo = algorithmSelect.value;
            
            let bestMove = -1;
            let nextMoveNum = moveCount + 1;
            
            if (diff === 'easy') {
                let available = [];
                for(let i=0; i<9; i++) if(board[i] === '') available.push(i);
                bestMove = available[Math.floor(Math.random() * available.length)];
                
                logStep(`Move ${nextMoveNum}: AI played position ${bestMove} (Random)`, 'ai');
                
                document.getElementById('stat-mm-nodes').textContent = '-';
                document.getElementById('stat-mm-time').textContent = '-';
                document.getElementById('stat-ab-nodes').textContent = '-';
                document.getElementById('stat-ab-time').textContent = '-';
                document.getElementById('stat-ab-pruned').textContent = '-';
                document.getElementById('bar-mm').style.width = '0%';
                document.getElementById('bar-ab').style.width = '0%';
                document.getElementById('reduction-text').textContent = '';

                makeMove(bestMove, 'O');
                if (gameActive) {
                    currentPlayer = 'X';
                    statusDisplay.textContent = 'Your turn! (X)';
                }
                return;
            }
            
            // Hard mode
            let mmTime = 0, abTime = 0;
            let mmMove = -1, abMove = -1;
            
            if (algo === 'minimax' || algo === 'both') {
                nodesMM = 0;
                let bestScore = -Infinity;
                let t0 = performance.now();
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = 'O';
                        let score = minimax(board, 0, false);
                        board[i] = '';
                        if (score > bestScore) {
                            bestScore = score;
                            mmMove = i;
                        }
                    }
                }
                let t1 = performance.now();
                mmTime = (t1 - t0).toFixed(2);
                
                document.getElementById('stat-mm-nodes').textContent = nodesMM;
                document.getElementById('stat-mm-time').textContent = mmTime;
            } else {
                document.getElementById('stat-mm-nodes').textContent = '-';
                document.getElementById('stat-mm-time').textContent = '-';
            }
            
            if (algo === 'alphabeta' || algo === 'both') {
                nodesAB = 0;
                prunedAB = 0;
                let bestScore = -Infinity;
                let t0 = performance.now();
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = 'O';
                        let score = alphabeta(board, 0, -Infinity, Infinity, false);
                        board[i] = '';
                        if (score > bestScore) {
                            bestScore = score;
                            abMove = i;
                        }
                    }
                }
                let t1 = performance.now();
                abTime = (t1 - t0).toFixed(2);
                
                document.getElementById('stat-ab-nodes').textContent = nodesAB;
                document.getElementById('stat-ab-time').textContent = abTime;
                document.getElementById('stat-ab-pruned').textContent = prunedAB;
            } else {
                document.getElementById('stat-ab-nodes').textContent = '-';
                document.getElementById('stat-ab-time').textContent = '-';
                document.getElementById('stat-ab-pruned').textContent = '-';
            }
            
            bestMove = (algo === 'minimax') ? mmMove : abMove;
            
            if (algo === 'both') {
                let maxNodes = Math.max(nodesMM, nodesAB);
                let pctMM = (nodesMM / maxNodes) * 100;
                let pctAB = (nodesAB / maxNodes) * 100;
                document.getElementById('bar-mm').style.width = pctMM + '%';
                document.getElementById('bar-ab').style.width = pctAB + '%';
                
                let savings = ((nodesMM - nodesAB) / nodesMM * 100).toFixed(1);
                document.getElementById('reduction-text').textContent = `Alpha-Beta pruned ${savings}% of nodes compared to Minimax`;
                logStep(`Move ${nextMoveNum}: AI played position ${bestMove} using Both (MM explored ${nodesMM} nodes in ${mmTime}ms, AB explored ${nodesAB} nodes in ${abTime}ms)`, 'ai');
            } else if (algo === 'minimax') {
                document.getElementById('bar-mm').style.width = '100%';
                document.getElementById('bar-ab').style.width = '0%';
                document.getElementById('reduction-text').textContent = '';
                logStep(`Move ${nextMoveNum}: AI played position ${bestMove} using Minimax (explored ${nodesMM} nodes in ${mmTime}ms)`, 'ai');
            } else {
                document.getElementById('bar-mm').style.width = '0%';
                document.getElementById('bar-ab').style.width = '100%';
                document.getElementById('reduction-text').textContent = '';
                logStep(`Move ${nextMoveNum}: AI played position ${bestMove} using Alpha-Beta (explored ${nodesAB} nodes in ${abTime}ms)`, 'ai');
            }

            makeMove(bestMove, 'O');
            if (gameActive) {
                currentPlayer = 'X';
                statusDisplay.textContent = 'Your turn! (X)';
            }
        }

        // Initialize game on load
        resetGame();
    </script>

## About
This project is an interactive, self-contained Tic-Tac-Toe game built from scratch using HTML, CSS, and Vanilla JavaScript. It serves as a visual and analytical demonstration of game theory algorithms, specifically comparing the performance of the **Minimax** algorithm against its optimized variant, **Alpha-Beta Pruning**.

## Algorithm Explanation

### Minimax
The Minimax algorithm is a decision-making tool used in artificial intelligence, game theory, and decision theory. It evaluates the entire game tree to find the optimal move, assuming the opponent is also playing optimally.
- **Game Tree:** The algorithm explores all possible future moves down to the terminal states (win, loss, or draw).
- **Process:** The "Maximizing" player tries to get the highest score, while the "Minimizing" player tries to get the lowest score. The algorithm works recursively from the leaves up to the root.

### Alpha-Beta Pruning
Alpha-Beta Pruning is an optimization technique for the Minimax algorithm. It reduces the number of nodes evaluated by the minimax algorithm in its search tree.
- **How it works:** It maintains two values, Alpha and Beta, which represent the minimum score that the maximizing player is assured of and the maximum score that the minimizing player is assured of, respectively.
- **Pruning:** If at any point the algorithm finds that a branch cannot possibly influence the final decision (because a better option was already found), it "prunes" or completely skips evaluating that branch.

### Comparison
| Algorithm | Completeness | Efficiency | When to use |
|-----------|--------------|------------|-------------|
| Minimax | Explores 100% of nodes | Slow | Small search spaces |
| Alpha-Beta | Explores ~10-50% of nodes | Fast | Deeper search trees |

Alpha-Beta guarantees the exact same optimal decision as Minimax, but achieves it significantly faster by avoiding redundant computations.
